name: 'Publish docker image to google artifacts'
description: 'This action checks out the commit, and deploy docker to google artifacts.'
author: 'yoobic'
inputs:
  gcp_credentials:
    required: true
    description: 'The google credentials'
  docker_context:
    required: false
    description: The docker context. Default to .
    default: '.'
  docker_file:
    required: false
    description: The docker file. Default tp ./Dockerfile
    default: ./Dockerfile
  docker_build_args:
    required: false
    description: The docker build args
    default: |
      NODE_ENV=production
  image:
    required: false
    description: 'The name of the image'
  additionalTag: 
    required: false
    description: 'Additional tag to be put' 
  region:
    required: false
    description: 'The google region'
    default: europe-west1
  registry:
    required: false
    description: 'The name of the artifact registry'
    default: yoobic-docker-images
  path_to_package_json:
    required: false
    description: 'The path to the package.json file'
    default: .
  latest:
    required: false
    description: 'Latest tag mode'
    default: "true"

runs:
  using: 'composite'
  steps:
    - id: repoName
      if: ${{ !inputs.image }}
      uses: notiz-dev/github-action-json-property@a5a9c668b16513c737c3e1f8956772c99c73f6e8 # release
      with:
        path: '${{ inputs.path_to_package_json }}/package.json'
        prop_path: 'name'

    - if: ${{ !inputs.image }}
      shell: bash
      run: echo "dockerImageName=$(echo ${{ steps.repoName.outputs.prop }})" >> $GITHUB_ENV

    - if: ${{ inputs.image }}
      shell: bash
      run: echo "dockerImageName=$(echo ${{ inputs.image }})" >> $GITHUB_ENV

    - id: auth
      uses: google-github-actions/auth@a61909d048e0be579b6c15b27088d19668493851 # v0.4.0
      with:
        credentials_json: ${{ inputs.gcp_credentials }}
        
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        
    - name: Get current version of the package
      id: package-version
      uses: martinbeentjes/npm-get-version-action@7aa1d82604bb2dbe377a64ca35e692e6fe333c9c # master
      with:
        path: ${{ inputs.path_to_package_json }}

    - name: Authorize docker cli
      shell: bash
      run: |-
        gcloud --quiet auth configure-docker ${{ inputs.region }}-docker.pkg.dev

    - name: Create a key file
      run: 'echo "$GCP_KEY" > google-credentials.json'
      shell: bash
      env:
        GCP_KEY: ${{ inputs.gcp_credentials }}

    - name: Check current commit
      shell: bash
      run: echo "current_commit=$(git rev-parse HEAD 2>/dev/null || echo ${{ github.sha }})" >> $GITHUB_ENV

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@b2391d37b4157fa4aa2e118d643f417910ff3242 # v3
      with:
        images: |
          ${{ inputs.region }}-docker.pkg.dev/${{ steps.auth.outputs.project_id }}/${{ inputs.registry }}/${{ env.dockerImageName }}
        tags: |
          type=ref,event=branch
          type=raw,value=github-${{ env.current_commit }}
          type=raw,value=v${{ steps.package-version.outputs.current-version }}
          type=raw,value=${{ inputs.additionalTag }}
        flavor: |
          latest=${{ inputs.latest }}
          prefix=
          suffix=

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@f211e3e9ded2d9377c8cadc4489a4e38014bc4c9 # v1

    - name: Build and push production image
      uses: docker/build-push-action@1104d471370f9806843c095c1db02b5a90c5f8b6 # v3
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.docker_file }}
        builder: ${{ steps.buildx.outputs.name }}
        provenance: false
        build-args: ${{ inputs.docker_build_args }}
        secret-files: |
          "GOOGLE_CREDENTIALS_SECRET_FILE=./google-credentials.json"
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
